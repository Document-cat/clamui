<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
    <rect width="1280" height="640" fill="#1e1e2e"/>
    
    <!-- Subtle Background Grid -->
    <g opacity="0.05">
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
        </pattern>
        <rect width="1280" height="640" fill="url(#grid)" />
    </g>

    <!-- Centered Content Group -->
    <g transform="translate(140, 192)">
        <!-- ClamUI Logo scaled up (256x256) -->
        <g transform="scale(2)">
            <!-- Original Logo Content -->
            <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="#2c3e50"/>
            <path fill="#ffffff" d="M30,30 L98,30 C102,30 108,50 105,70 C100,95 64,115 64,115 C64,115 28,95 23,70 C20,50 26,30 30,30 Z"/>
            <g transform="translate(27, 35) scale(0.7)">
                <path fill="#3498db" d="M10,20 C10,20 0,45 10,70 C15,85 30,95 50,95 C75,95 95,75 100,55 C105,35 90,15 70,5 C50,-5 25,0 10,20 Z"/>
                <g fill="none" stroke="#2980b9" stroke-width="4" stroke-linecap="round">
                    <path d="M25,15 C40,5 70,10 85,30"/>
                    <path d="M18,45 C30,40 60,40 90,55"/>
                    <path d="M20,75 C35,85 65,85 85,70"/>
                </g>
                <path fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" d="M12,24 C8,45 8,55 12,70"/>
            </g>
        </g>

        <!-- Typography (Shifted right of logo) -->
        <text x="300" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="bold" fill="#ffffff">ClamUI</text>
        <text x="305" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="34" fill="#a6accd">A modern graphical user interface for ClamAV</text>
        
        <!-- Decorative accent -->
        <rect x="305" y="230" width="100" height="8" rx="4" fill="#3498db"/>
    </g>
</svg>